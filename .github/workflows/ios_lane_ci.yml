name: iOS Lane CI

# Validates iOS-related artifacts (Capacitor config, ios/ Xcode project, App
# Store assets) without ever blocking web changes. Only runs when iOS-related
# files change so it stays out of the way of normal web PRs.

on:
  pull_request:
    paths:
      - "ios/**"
      - "capacitor.config.*"
      - "scripts/ios-bootstrap.sh"
      - ".github/workflows/ios_lane_ci.yml"
      - "docs/release/ios-*.md"
  push:
    branches:
      - "release/ios-**"

permissions:
  contents: read

concurrency:
  group: ios-lane-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-ios-config:
    name: Validate iOS configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Capacitor config exists when ios/ is present
        run: |
          if [ -d "ios" ]; then
            test -f capacitor.config.json || test -f capacitor.config.ts || (echo "Missing capacitor.config.*" && exit 1)
          fi

      - name: Sanity check - web build still succeeds with iOS files present
        run: npm run lint
        env:
          # iOS work must never break the shared lint pass.
          NEXT_TELEMETRY_DISABLED: "1"
